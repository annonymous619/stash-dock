{
  "extractor": {
    "base-directory": "/downloads",
    "archive": "/config/gallery-dl-archive.sqlite3",
    "directory": [
      "{category}",
      "{author[name]|user|username|account|profile|channel|uploader|owner|artist|id}",
      "{title|album|gallery_id|id}"
    ],
    "filename": "{num:>03}_{filename}.{extension}",
    "erome": {
      "directory": ["Erome", "{user}", "{title} - {album_id}"],
      "filename": "{num:>03}.{extension}",
      "videos": true
    }
  }
}
